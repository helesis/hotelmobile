<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Spa Yönetim — Some Lucky Resort</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .admin-layout{display:flex;min-height:calc(100vh - 70px)}
    .sidebar{width:220px;flex-shrink:0;background:var(--navy-mid);border-right:1px solid rgba(201,168,76,.12);padding:1.5rem 0;position:sticky;top:70px;height:calc(100vh - 70px);overflow-y:auto}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;letter-spacing:.04em;color:var(--cream-dim);cursor:pointer;transition:var(--transition);border-left:3px solid transparent}
    .sidebar-item:hover{color:var(--cream);background:rgba(255,255,255,.03)}
    .sidebar-item.active{color:var(--gold-light);border-left-color:var(--gold);background:rgba(201,168,76,.06)}
    .sidebar-icon{font-size:16px;width:20px;text-align:center}
    .sidebar-section{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--cream-dim);opacity:.5;padding:1.2rem 20px .4rem}
    .main{flex:1;padding:2rem;max-width:1200px;min-width:0}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold-light);margin-bottom:.3rem}
    .page-sub{font-size:13px;color:var(--cream-dim);margin-bottom:2rem}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
    .section-head h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold-light)}
    .data-table{width:100%;border-collapse:collapse}
    .data-table th{text-align:left;padding:10px 14px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--cream-dim);border-bottom:1px solid rgba(201,168,76,.12)}
    .data-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;vertical-align:middle}
    .data-table tr:hover td{background:rgba(255,255,255,.02)}
    .action-btns{display:flex;gap:6px}
    .tab-bar{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid rgba(201,168,76,.12);padding-bottom:0}
    .tab{padding:9px 18px;font-size:13px;cursor:pointer;color:var(--cream-dim);border-bottom:2px solid transparent;transition:var(--transition);margin-bottom:-1px}
    .tab:hover{color:var(--cream)}
    .tab.active{color:var(--gold-light);border-bottom-color:var(--gold)}
    .time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .reservations-filters{display:flex;gap:10px;margin-bottom:1rem;align-items:center}
    .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
    .status-confirmed{background:var(--green)}
    .status-cancelled{background:var(--red)}
    /* ── Calendar view ── */
    .calendar-date-bar{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
    .calendar-date-bar label{font-size:12px;color:var(--cream-dim);letter-spacing:.06em}
    .calendar-date-bar input[type="date"]{background:var(--navy-card);border:1px solid rgba(201,168,76,.2);border-radius:var(--radius);color:var(--cream);padding:8px 12px;font-size:14px}
    .calendar-wrapper{overflow-x:auto;border:1px solid rgba(201,168,76,.12);border-radius:var(--radius);background:var(--navy-card)}
    .calendar-grid{border-collapse:collapse;min-width:100%}
    .calendar-grid th,.calendar-grid td{border:1px solid rgba(201,168,76,.08);padding:0;vertical-align:top}
    .calendar-grid th{background:var(--navy-mid);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--cream-dim);text-align:center;padding:10px 8px}
    .calendar-grid th.time-col{min-width:60px;text-align:right;padding-right:12px}
    .calendar-grid td.time-cell{background:var(--navy-mid);font-size:12px;color:var(--cream-dim);padding:6px 12px 6px 0;text-align:right;min-width:60px}
    .calendar-grid td.room-cell{min-width:140px;min-height:32px;position:relative;padding:2px}
    .cal-event{background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.12));border-left:3px solid var(--gold);border-radius:4px;padding:6px 8px;font-size:11px;color:var(--cream);cursor:pointer;overflow:hidden;height:100%;box-sizing:border-box}
    .cal-event.cancelled{opacity:.5;background:rgba(120,120,120,.2);border-left-color:var(--red)}
    .cal-event.schedule-conflict{background:linear-gradient(135deg,rgba(192,57,43,.35),rgba(192,57,43,.2));border-left-color:var(--red);color:#ffd4d4}
    .cal-event .cal-guest{font-weight:600;margin-bottom:2px}
    .cal-event .cal-meta{font-size:10px;color:var(--cream-dim)}
    .res-view-tabs{display:flex;gap:4px;margin-bottom:1rem}
    .res-view-tabs .tab{margin-bottom:0}
    /* ── Terapist modal: saat inputları ── */
    #timeRows input[type="time"]{font-size:11px;padding:4px 6px;max-width:75px}
    /* ── Rezervasyon dashboard ── */
    .res-dashboard{margin-top:2rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
    .dash-card{background:linear-gradient(145deg,var(--navy-card) 0%,var(--navy-mid) 100%);border:1px solid rgba(201,168,76,.15);border-radius:var(--radius);padding:1.25rem;position:relative;overflow:hidden}
    .dash-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle at 100% 0%,rgba(201,168,76,.12) 0%,transparent 70%);pointer-events:none}
    .dash-card .dash-icon{font-size:24px;margin-bottom:8px;opacity:.9}
    .dash-card .dash-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-dim);margin-bottom:4px}
    .dash-card .dash-value{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold-light);font-weight:600}
    .dash-card.gold .dash-value{color:var(--gold)}
    .dash-stats{grid-column:1/-1;background:linear-gradient(145deg,var(--navy-card) 0%,var(--navy-mid) 100%);border:1px solid rgba(201,168,76,.15);border-radius:var(--radius);padding:1.25rem}
    .dash-stats h4{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold-light);margin-bottom:12px;letter-spacing:.06em}
    .dash-stats-list{display:flex;flex-wrap:wrap;gap:8px}
    .dash-stat-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--cream)}
    .dash-stat-pill .count{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--gold);font-size:14px}
    .res-dashboard-wrap{margin-top:2rem}
    .res-dashboard-wrap:empty{display:none}
    .res-dashboard-wrap .dash-empty{grid-column:1/-1;text-align:center;padding:2rem;color:var(--cream-dim);font-size:14px}
    .discount-rules-card{background:linear-gradient(145deg,var(--navy-card) 0%,var(--navy-mid) 100%);border:1px solid rgba(201,168,76,.15);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:2rem}
    .discount-rules-card h4{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold-light);margin:0 0 10px;letter-spacing:.04em}
    .discount-rules-card p{font-size:13px;color:var(--cream-dim);line-height:1.55;margin:0 0 14px}
    .discount-rules-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px}
    .discount-rules-meta span{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.22);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--cream)}
    .discount-rules-meta strong{color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-size:15px}
    .discount-steps-table{width:100%;max-width:420px;border-collapse:collapse;font-size:13px}
    .discount-steps-table th,.discount-steps-table td{padding:8px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
    .discount-steps-table th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--cream-dim)}
    .discount-steps-table td{color:var(--cream)}
    .avail-slider-block{margin-bottom:18px}
    .avail-slider-block label{display:block;font-size:12px;color:var(--cream-dim);margin-bottom:6px;letter-spacing:.04em}
    .avail-slider-row{display:flex;align-items:center;gap:14px;max-width:480px}
    .avail-slider-row input[type=range]{flex:1;min-width:0;height:6px;-webkit-appearance:none;appearance:none;background:rgba(201,168,76,.2);border-radius:3px}
    .avail-slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--navy)}
    .avail-slider-row input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--navy)}
    .avail-slider-val{min-width:52px;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold-light);text-align:right}
    .avail-save-row{margin-top:16px}
    /* Terapist foto düzenleyici */
    .therapist-photo-editor{margin-top:10px;padding:12px;background:var(--navy-mid);border:1px solid rgba(201,168,76,.15);border-radius:var(--radius)}
    .therapist-photo-editor .photo-preview-wrap{width:120px;height:120px;border-radius:50%;overflow:hidden;border:2px solid rgba(201,168,76,.35);margin:10px auto;background:var(--navy-card)}
    .therapist-photo-editor .photo-preview-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .therapist-photo-editor .photo-tools{display:grid;gap:10px;margin-top:8px}
    .therapist-photo-editor label.slider-label{font-size:11px;color:var(--cream-dim);letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center}
    .therapist-photo-editor input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:rgba(201,168,76,.2);border-radius:3px}
    .therapist-photo-editor input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--navy)}
    .therapist-photo-editor .photo-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:6px}
    .therapist-photo-hint{font-size:11px;color:var(--cream-dim);line-height:1.4;margin-top:6px}
  </style>
</head>
<body>
<header class="header">
  <div class="header-logo">
    <div class="logo-icon">V</div>
    <div>
      <div class="logo-text">Some Lucky Resort</div>
      <span class="logo-sub">Spa Yönetim Paneli</span>
    </div>
  </div>
  <nav class="header-nav">
    <a href="/">Rezervasyon</a>
    <a href="/admin" class="active">Yönetim</a>
  </nav>
  <div class="header-user">
    <div class="avatar">JF</div>
    <span>Jonas Furlong</span>
  </div>
</header>
<div class="gold-line"></div>

<div class="admin-layout">
  <nav class="sidebar">
    <div class="sidebar-section">Genel</div>
    <div class="sidebar-item active" onclick="showSection('reservations',this)"><span class="sidebar-icon">📋</span>Rezervasyonlar</div>
    <div class="sidebar-section">Tanımlar</div>
    <div class="sidebar-item" onclick="showSection('massages',this)"><span class="sidebar-icon">💆</span>Masaj Türleri</div>
    <div class="sidebar-item" onclick="showSection('therapists',this)"><span class="sidebar-icon">👤</span>Terapistler</div>
    <div class="sidebar-item" onclick="showSection('rooms',this)"><span class="sidebar-icon">🚪</span>Kabinler</div>
    <div class="sidebar-item" onclick="showSection('discounts',this)"><span class="sidebar-icon">🏷️</span>İndirim Oranları</div>
  </nav>

  <main class="main" id="mainContent"></main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Başlık</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>
<div id="toast"></div>

<script>
let state={massages:[],therapists:[],rooms:[],reservations:[],discounts:[],availDiscountConfig:{max_percent:15,step_percent:3}};
let currentSection='reservations';
const DAYS=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
const DAYS_FULL=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];

// ── API helpers ──────────────────────────────────────────────────────────────
async function api(method,url,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch('/api'+url,opts);
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||'Hata');
  return d;
}

async function loadAll(){
  const[m,t,ro,res,d,ad]=await Promise.all([
    api('GET','/massage-types'),api('GET','/therapists'),api('GET','/rooms'),api('GET','/reservations'),api('GET','/time-slot-discounts'),
    api('GET','/availability-discount-settings').catch(()=>({max_percent:15,step_percent:3}))
  ]);
  state.massages=Array.isArray(m)?m:[];
  state.therapists=Array.isArray(t)?t:[];
  state.rooms=Array.isArray(ro)?ro:[];
  state.reservations=Array.isArray(res)?res:[];
  state.discounts=Array.isArray(d)?d:[];
  state.availDiscountConfig={max_percent:+ad.max_percent||15,step_percent:+ad.step_percent||3};
}

// ── Section routing ──────────────────────────────────────────────────────────
async function showSection(name,el){
  currentSection=name;
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  if(el&&el.classList)el.classList.add('active');
  if(name==='massages'){
    try{
      const m=await api('GET','/massage-types');
      state.massages=Array.isArray(m)?m:[];
    }catch(e){console.error(e);}
  }
  renderSection();
}

function renderSection(){
  switch(currentSection){
    case'reservations':renderReservations();break;
    case'massages':renderMassages();break;
    case'therapists':renderTherapists();break;
    case'rooms':renderRooms();break;
    case'discounts':renderDiscounts();break;
  }
}

// ── Reservations & Calendar ──────────────────────────────────────────────────
const TZ='Europe/Istanbul';
function toIstanbulDateStr(d){return d.toLocaleDateString('en-CA',{timeZone:TZ});}
let calendarDate=toIstanbulDateStr(new Date());
let calendarReservations=[];

async function loadCalendarReservations(date){
  try{
    if(!state.massages||!state.massages.length){
      try{state.massages=await api('GET','/massage-types');}catch(e){/* yedek liste fiyatı için */ }
    }
    const data=await api('GET','/reservations?date='+date);
    calendarReservations=Array.isArray(data)?data:[];
    renderCalendarGrid(date);
    renderReservationDashboard(date);
  }catch(e){
    calendarReservations=[];
    renderCalendarGrid(date);
    renderReservationDashboard(date);
  }
}

function timeToMins(t){
  const[h,m]=t.split(':').map(Number);
  return h*60+m;
}

function isReservationScheduleConflict(r,date){
  const t=(state.therapists||[]).find(x=>x.id===r.therapist_id);
  if(!t)return false;
  const dayOfWeek=new Date(date+'T12:00:00').getDay();
  const sched=(t.schedule||[]).find(s=>s.day_of_week===dayOfWeek);
  if(!sched)return true;
  const resStart=timeToMins(r.start_time);const resEnd=timeToMins(r.end_time);
  const workStart=timeToMins(sched.start_time);const workEnd=timeToMins(sched.end_time);
  return resStart<workStart||resEnd>workEnd;
}

function renderReservations(){
  document.getElementById('mainContent').innerHTML=`
    <div class="page-title">Rezervasyonlar</div>
    <div class="page-sub">Takvim görünümünde rezervasyonları inceleyin</div>
    <div class="calendar-date-bar">
      <label for="calendarDate">Tarih</label>
      <input type="date" id="calendarDate" value="${calendarDate}" onchange="onCalendarDateChange()">
      <button class="btn btn-outline btn-sm" onclick="prevCalendarDay()">← Önceki</button>
      <button class="btn btn-outline btn-sm" onclick="nextCalendarDay()">Sonraki →</button>
    </div>
    <div class="res-view-tabs">
      <div class="tab active" onclick="setResView('calendar',this)">Takvim</div>
      <div class="tab" onclick="setResView('list',this)">Liste</div>
    </div>
    <div id="resCalendarWrap"></div>
    <div id="resTableWrap" style="display:none"></div>
    <div id="resDashboardWrap" class="res-dashboard res-dashboard-wrap"></div>`;
  loadCalendarReservations(calendarDate);
}

function onCalendarDateChange(){
  calendarDate=document.getElementById('calendarDate').value;
  loadCalendarReservations(calendarDate);
}

function prevCalendarDay(){
  const d=new Date(calendarDate+'T12:00:00+03:00');
  d.setDate(d.getDate()-1);
  calendarDate=toIstanbulDateStr(d);
  document.getElementById('calendarDate').value=calendarDate;
  loadCalendarReservations(calendarDate);
}

function nextCalendarDay(){
  const d=new Date(calendarDate+'T12:00:00+03:00');
  d.setDate(d.getDate()+1);
  calendarDate=toIstanbulDateStr(d);
  document.getElementById('calendarDate').value=calendarDate;
  loadCalendarReservations(calendarDate);
}

function setResView(view,el){
  document.querySelectorAll('.res-view-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('resCalendarWrap').style.display=view==='calendar'?'block':'none';
  document.getElementById('resTableWrap').style.display=view==='list'?'block':'none';
  if(view==='list')renderResTable(state.reservations.filter(r=>r.date===calendarDate));
}

function renderResTable(list){
  const wrap=document.getElementById('resTableWrap');
  if(!wrap)return;
  if(!list.length){wrap.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>Bu tarihte rezervasyon bulunamadı.</div>';return;}
  wrap.innerHTML=`<table class="data-table">
    <thead><tr><th>Saat</th><th>Misafir</th><th>Terapist</th><th>Masaj</th><th>Durum</th><th></th></tr></thead>
    <tbody>${list.map(r=>`
      <tr>
        <td>${r.start_time} – ${r.end_time}</td>
        <td>${r.guest_name}</td>
        <td>${r.therapist_name}</td>
        <td>${r.massage_name}<br><small style="color:var(--cream-dim)">₺${Number(r.price).toLocaleString('tr-TR')} · ${r.duration_minutes}dk · ${r.room_name}</small></td>
        <td><span class="status-dot status-${r.status}"></span>${r.status==='confirmed'?'Onaylı':'İptal'}</td>
        <td>${r.status==='confirmed'?`<button class="btn btn-danger btn-sm" onclick="cancelReservation(${r.id})">İptal</button>`:''}</td>
      </tr>`).join('')}
    </tbody></table>`;
}

function renderCalendarGrid(date){
  const wrap=document.getElementById('resCalendarWrap');
  if(!wrap)return;
  const rooms=(state.rooms||[]).filter(r=>r.is_active!==0);
  if(!rooms.length){wrap.innerHTML='<div class="empty-state"><div class="empty-icon">🚪</div>Tanımlı kabin bulunamadı.</div>';return;}
  const openTime=rooms[0].open_time||'09:00';
  const closeTime=rooms[0].close_time||'21:00';
  const[openH,openM]=openTime.split(':').map(Number);
  const[closeH,closeM]=closeTime.split(':').map(Number);
  const startMins=openH*60+openM;
  const endMins=closeH*60+closeM;
  const slotMins=30;
  const slots=[];
  for(let m=startMins;m<endMins;m+=slotMins){
    slots.push(`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`);
  }
  const resList=calendarReservations.filter(r=>r.date===date&&r.status!=='cancelled');
  const resByRoomSlot={};
  resList.forEach(r=>{
    const startSlotMins=timeToMins(r.start_time);
    const endSlotMins=timeToMins(r.end_time);
    const slotIndex=Math.floor((startSlotMins-startMins)/slotMins);
    const spanSlots=Math.max(1,Math.ceil((endSlotMins-startSlotMins)/slotMins));
    if(slotIndex>=0&&slotIndex<slots.length){
      if(!resByRoomSlot[r.room_id])resByRoomSlot[r.room_id]={};
      resByRoomSlot[r.room_id][slotIndex]={res:r,span:spanSlots};
    }
  });
  let html=`<div class="calendar-wrapper"><table class="calendar-grid"><thead><tr><th class="time-col">Saat</th>`;
  rooms.forEach(rm=>{html+=`<th>${rm.name}</th>`;});
  html+=`</tr></thead><tbody>`;
  slots.forEach((slot,i)=>{
    html+=`<tr><td class="time-cell">${slot}</td>`;
    rooms.forEach(rm=>{
      const cell=resByRoomSlot[rm.id]?.[i];
      if(isCellCoveredByRowspan(rm.id,i,resByRoomSlot)){
      }else if(cell&&cell.span>0){
        const r=cell.res;
        const conflict=isReservationScheduleConflict(r,date);
        html+=`<td class="room-cell" rowspan="${cell.span}"><div class="cal-event ${r.status==='cancelled'?'cancelled':''} ${conflict?'schedule-conflict':''}" title="${conflict?'⚠️ Terapist çalışma programıyla uyumsuz — ':''}Tıkla: İptal et" onclick="cancelReservation(${r.id})"><div class="cal-guest">${r.guest_name}</div><div class="cal-meta">${r.massage_name} · ${r.therapist_name}<br>${r.start_time}–${r.end_time} · ₺${Number(r.price).toLocaleString('tr-TR')}</div></div></td>`;
      }else{
        html+=`<td class="room-cell"></td>`;
      }
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  wrap.innerHTML=html;
}

function computeDiscountStats(resList){
  const massages=state.massages||[];
  let sumPct=0,nPct=0,totalSaved=0;
  resList.forEach(r=>{
    let listP=parseFloat(r.list_price);
    const paid=parseFloat(r.price);
    if(!Number.isFinite(listP)||listP<=0){
      const mt=massages.find(m=>Number(m.id)===Number(r.massage_type_id));
      if(mt)listP=parseFloat(mt.price);
    }
    if(!Number.isFinite(listP)||listP<=0)listP=Number.isFinite(paid)&&paid>0?paid:NaN;
    if(!Number.isFinite(listP)||listP<=0||!Number.isFinite(paid))return;
    const disc=Math.max(0,listP-paid);
    totalSaved+=disc;
    const pct=(disc/listP)*100;
    sumPct+=pct;
    nPct+=1;
  });
  const avgPct=nPct?sumPct/nPct:0;
  return{avgPct,totalSaved,nWithList:nPct};
}

function isCellCoveredByRowspan(roomId,slotIndex,resByRoomSlot,rooms,slots){
  const cell=resByRoomSlot[roomId];
  if(!cell)return false;
  for(let s=0;s<slotIndex;s++){
    const prev=cell[s];
    if(prev&&s+prev.span>slotIndex)return true;
  }
  return false;
}

function therapistPhotoUrlForInput(pu){

let therapistPhotoState={img:null,outputSize:320,zoom:1,processedDataUrl:null,originalSavedUrl:null,hadNewFile:false};

function initTherapistPhotoEditor(t){
  therapistPhotoState={img:null,outputSize:320,zoom:1,processedDataUrl:null,originalSavedUrl:t?.photo_url||null,hadNewFile:false};
  const fileIn=document.getElementById('tPhotoFile');
  const panel=document.getElementById('tPhotoEditorPanel');
  const prev=document.getElementById('tPhotoPreview');
  const clr=document.getElementById('tPhotoClearFile');
  const sizeSl=document.getElementById('tPhotoOutputSize');
  const zoomSl=document.getElementById('tPhotoZoom');
  if(!fileIn||!panel)return;

  const syncSliderLabels=()=>{
    const sz=document.getElementById('tPhotoSizeVal');
    const zv=document.getElementById('tPhotoZoomVal');
    if(sz)sz.textContent=(sizeSl?.value||320)+' px';
    if(zv)zv.textContent=((zoomSl?.value||100)/100).toFixed(2)+'×';
  };

  fileIn.value='';
  if(clr)clr.style.display='none';

  if(t?.photo_url){
    panel.style.display='block';
    loadTherapistPhotoImage(t.photo_url,()=>{syncSliderLabels();},{previewOnly:false});
  }else{
    panel.style.display='none';
    if(prev){prev.removeAttribute('src');}
  }

  if(sizeSl){
    sizeSl.value=String(therapistPhotoState.outputSize);
    sizeSl.oninput=()=>{
      therapistPhotoState.outputSize=+sizeSl.value;
      syncSliderLabels();
      reprocessTherapistPhoto();
    };
  }
  if(zoomSl){
    zoomSl.value='100';
    therapistPhotoState.zoom=1;
    zoomSl.oninput=()=>{
      therapistPhotoState.zoom=(+zoomSl.value)/100;
      syncSliderLabels();
      reprocessTherapistPhoto();
    };
  }
  syncSliderLabels();

  fileIn.onchange=()=>{
    const f=fileIn.files?.[0];
    if(!f)return;
    if(f.size>8*1024*1024){showToast('Dosya 8 MB’dan küçük olmalı.','error');fileIn.value='';return;}
    const r=new FileReader();
    r.onload=e=>{
      therapistPhotoState.hadNewFile=true;
      if(clr)clr.style.display='inline-block';
      panel.style.display='block';
      loadTherapistPhotoImage(e.target.result,()=>{syncSliderLabels();},{previewOnly:false});
    };
    r.readAsDataURL(f);
  };

  if(clr){
    clr.onclick=()=>{
      fileIn.value='';
      therapistPhotoState.hadNewFile=false;
      therapistPhotoState.processedDataUrl=null;
      clr.style.display='none';
      if(therapistPhotoState.originalSavedUrl){
        loadTherapistPhotoImage(therapistPhotoState.originalSavedUrl,()=>{syncSliderLabels();},{previewOnly:false});
      }else{
        therapistPhotoState.img=null;
        panel.style.display='none';
        if(prev)prev.removeAttribute('src');
      }
    };
  }
}

function loadTherapistPhotoImage(src,onDone,opts){
  const prev=document.getElementById('tPhotoPreview');
  const im=new Image();
  im.onload=()=>{
    therapistPhotoState.img=im;
    reprocessTherapistPhoto();
    if(onDone)onDone();
  };
  im.onerror=()=>{
    therapistPhotoState.img=null;
    if(prev){prev.src=src;}
    therapistPhotoState.processedDataUrl=null;
    if(onDone)onDone();
    if(opts?.previewOnly!==false&&!String(src).startsWith('data:')){}
  };
  im.src=src;
}

function reprocessTherapistPhoto(){
  const im=therapistPhotoState.img;
  const prev=document.getElementById('tPhotoPreview');
  if(!im||!im.naturalWidth){
    if(therapistPhotoState.originalSavedUrl&&prev&&!therapistPhotoState.hadNewFile)prev.src=therapistPhotoState.originalSavedUrl;
    return;
  }
  const w=im.naturalWidth,h=im.naturalHeight;
  const z=Math.max(1,therapistPhotoState.zoom);
  let side=Math.min(w,h)/z;
  side=Math.max(1,Math.min(side,Math.min(w,h)));
  let sx=(w-side)/2,sy=(h-side)/2;
  sx=Math.max(0,Math.min(sx,w-side));
  sy=Math.max(0,Math.min(sy,h-side));
  const out=Math.max(80,Math.min(512,therapistPhotoState.outputSize));
  const c=document.createElement('canvas');
  c.width=out;c.height=out;
  const ctx=c.getContext('2d');
  try{
    ctx.drawImage(im,sx,sy,side,side,0,0,out,out);
    therapistPhotoState.processedDataUrl=c.toDataURL('image/jpeg',0.88);
    if(prev)prev.src=therapistPhotoState.processedDataUrl;
  }catch(err){
    console.warn(err);
    if(prev)prev.src=im.src;
    therapistPhotoState.processedDataUrl=null;
    showToast('Bu görsel kaynakta düzenlenemiyor; yerel dosya yükleyin veya başka URL deneyin.','error');
  }
}

function therapistPhotoUrlForSave(){
  if(therapistPhotoState.processedDataUrl)return therapistPhotoState.processedDataUrl;
  const u=v('tPhoto').trim();
  if(u)return u;
  return therapistPhotoState.originalSavedUrl||null;
}

async function toggleTherapistDay(therapistId,dayOfWeek,el){
  const t=state.therapists.find(x=>x.id===therapistId);
  if(!t)return;
  const schedMap={};
  (t.schedule||[]).forEach(s=>{schedMap[s.day_of_week]={start:s.start_time,end:s.end_time};});
  const wasActive=!!schedMap[dayOfWeek];
  if(wasActive){delete schedMap[dayOfWeek];}else{schedMap[dayOfWeek]={start:'09:00',end:'21:00'};}
  const schedule=Object.entries(schedMap).map(([d,times])=>({day_of_week:+d,start_time:times.start,end_time:times.end}));
  try{
    await api('PUT',`/therapists/${therapistId}`,{
      name:t.name,
      photo_url:t.photo_url||null,
      is_active:t.is_active,
      massage_type_ids:t.massage_types.map(m=>m.id),
      schedule
    });
    await loadAll();renderSection();
    showToast(wasActive?'Çalışma günü kaldırıldı.':'Çalışma günü eklendi.','success');
  }catch(e){showToast(e.message,'error');}
}

async function deleteTherapist(id){
  if(!confirm('Terapisti silmek istediğinize emin misiniz?'))return;
  try{await api('DELETE',`/therapists/${id}`);await loadAll();renderSection();showToast('Silindi.','success');}
  catch(e){showToast(e.message,'error');}
}

// ── Rooms ─────────────────────────────────────────────────────────────────────
function renderRooms(){
  document.getElementById('mainContent').innerHTML=`
    <div class="page-title">Kabinler</div>
    <div class="page-sub">Masaj kabinleri ve çalışma saatleri</div>
    <div class="section-head">
      <h3>Kabinler</h3>
      <button class="btn btn-gold btn-sm" onclick="openRoomModal()">+ Yeni Ekle</button>
    </div>
    <table class="data-table">
      <thead><tr><th>Kabin Adı</th><th>Çalışma Saatleri</th><th>Durum</th><th></th></tr></thead>
      <tbody>${state.rooms.map(r=>`
        <tr>
          <td><strong>${r.name}</strong></td>
          <td>${r.open_time} – ${r.close_time}</td>
          <td><span class="badge ${r.is_active?'badge-green':'badge-red'}">${r.is_active?'Aktif':'Pasif'}</span></td>
          <td><div class="action-btns">
            <button class="btn btn-outline btn-sm" onclick="openRoomModal(${r.id})">Düzenle</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRoom(${r.id})">Sil</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function openRoomModal(id){
  const r=id?state.rooms.find(x=>x.id===id):null;
  openModal(r?'Kabin Düzenle':'Yeni Kabin',`
    <div class="form-group"><label>Kabin Adı</label><input class="form-control" id="rName" value="${r?.name||''}"></div>
    <div class="time-grid">
      <div class="form-group"><label>Açılış Saati</label><input class="form-control" type="time" id="rOpen" value="${r?.open_time||'09:00'}"></div>
      <div class="form-group"><label>Kapanış Saati</label><input class="form-control" type="time" id="rClose" value="${r?.close_time||'21:00'}"></div>
    </div>
    <div class="form-group"><label>Durum</label>
      <select class="form-control" id="rActive">
        <option value="1" ${!r||r.is_active?'selected':''}>Aktif</option>
        <option value="0" ${r&&!r.is_active?'selected':''}>Pasif</option>
      </select></div>`,
  async()=>{
    const name=v('rName');if(!name)return showToast('Ad zorunludur.','error');
    const body={name,open_time:v('rOpen'),close_time:v('rClose'),is_active:+v('rActive')};
    if(id)await api('PUT',`/rooms/${id}`,body);
    else await api('POST','/rooms',body);
    await loadAll();renderSection();closeModal();
    showToast(id?'Güncellendi.':'Eklendi.','success');
  });
}

async function deleteRoom(id){
  if(!confirm('Kabini silmek istediğinize emin misiniz?'))return;
  try{await api('DELETE',`/rooms/${id}`);await loadAll();renderSection();showToast('Silindi.','success');}
  catch(e){showToast(e.message,'error');}
}

// ── İndirim Oranları ─────────────────────────────────────────────────────────
function buildAvailPreviewRows(maxP,stepP){
  const max=Math.max(0,Math.min(100,+maxP||0));
  const step=Math.max(0,Math.min(100,+stepP||0));
  const rows=[];
  for(let sold=0;sold<=4;sold++){
    rows.push({label:String(sold),pct:Math.max(0,max-sold*step)});
  }
  rows.push({label:'5 ve üzeri',pct:Math.max(0,max-5*step)});
  return rows;
}
function availPreviewTbodyHtml(maxP,stepP){
  return buildAvailPreviewRows(maxP,stepP).map(s=>`<tr><td>${s.label}</td><td><span class="badge badge-green">%${s.pct}</span></td></tr>`).join('');
}
function onAvailDiscountSlider(){
  const maxEl=document.getElementById('availMaxSlider');
  const stepEl=document.getElementById('availStepSlider');
  if(!maxEl||!stepEl)return;
  const max=+maxEl.value,step=+stepEl.value;
  const ml=document.getElementById('availMaxLabel');
  const sl=document.getElementById('availStepLabel');
  if(ml)ml.textContent=max;
  if(sl)sl.textContent=step;
  const tb=document.getElementById('availStepPreviewBody');
  if(tb)tb.innerHTML=availPreviewTbodyHtml(max,step);
}
async function saveAvailabilityDiscountSettings(){
  const maxEl=document.getElementById('availMaxSlider');
  const stepEl=document.getElementById('availStepSlider');
  if(!maxEl||!stepEl)return;
  try{
    const body={max_percent:+maxEl.value,step_percent:+stepEl.value};
    const ad=await api('PUT','/availability-discount-settings',body);
    state.availDiscountConfig={max_percent:+ad.max_percent,step_percent:+ad.step_percent};
    showToast('Müsaitlik indirimi kaydedildi.','success');
  }catch(e){showToast(e.message,'error');}
}
function renderDiscounts(){
  const cfg=state.availDiscountConfig||{max_percent:15,step_percent:3};
  const maxM=Math.round(cfg.max_percent),stepM=Math.round(cfg.step_percent);
  document.getElementById('mainContent').innerHTML=`
    <div class="page-title">İndirim Oranları</div>
    <div class="page-sub">Müsaitlik ve saat dilimi kuralları rezervasyon ekranında birleştirilir; misafire geçerli olan <strong>daha yüksek</strong> indirim uygulanır.</div>
    <div class="discount-rules-card">
      <h4>Müsaitlik indirimi (otomatik)</h4>
      <p>Her slotta o anda devam eden dolu rezervasyon (kabın) sayısına göre hesaplanır. Aşağıdaki kaydırıcılarla <strong>başlangıç oranı</strong> ve <strong>adım</strong> değiştirilebilir; kaydettikten sonra rezervasyon ekranı güncellenir.</p>
      <div class="avail-slider-block">
        <label>İndirim başlangıcı — 0 dolu kabinde uygulanacak maksimum (%)</label>
        <div class="avail-slider-row">
          <input type="range" id="availMaxSlider" min="0" max="100" step="1" value="${maxM}" oninput="onAvailDiscountSlider()">
          <span class="avail-slider-val" id="availMaxLabel">${maxM}</span>
        </div>
      </div>
      <div class="avail-slider-block">
        <label>Her dolu rezervasyonda düşüş — adım (%)</label>
        <div class="avail-slider-row">
          <input type="range" id="availStepSlider" min="0" max="25" step="1" value="${stepM}" oninput="onAvailDiscountSlider()">
          <span class="avail-slider-val" id="availStepLabel">${stepM}</span>
        </div>
      </div>
      <div class="avail-save-row">
        <button type="button" class="btn btn-gold btn-sm" onclick="saveAvailabilityDiscountSettings()">Müsaitlik ayarlarını kaydet</button>
      </div>
      <div class="discount-rules-meta" style="margin-top:18px">
        <span>Alt sınır: <strong>%0</strong></span>
        <span>Önizleme tablosu kaydırıcılarla anlık güncellenir</span>
      </div>
      <table class="discount-steps-table">
        <thead><tr><th>O slottaki dolu rezervasyon sayısı</th><th>İndirim oranı</th></tr></thead>
        <tbody id="availStepPreviewBody">${availPreviewTbodyHtml(maxM,stepM)}</tbody>
      </table>
    </div>
    <div class="section-head">
      <h3>Zaman dilimi indirimleri</h3>
      <button class="btn btn-gold btn-sm" onclick="openDiscountModal()">+ Yeni Ekle</button>
    </div>
    <p class="page-sub" style="margin-top:-8px;margin-bottom:1rem">Aşağıdaki satırlarda her aralık için <strong>indirim başlangıç / bitiş saati</strong> ve o pencerede uygulanacak <strong>sabit indirim oranı</strong> tanımlanır.</p>
    <table class="data-table">
      <thead><tr><th>Etiket</th><th>İndirim başlangıç (saat)</th><th>İndirim bitiş (saat)</th><th>İndirim oranı (%)</th><th></th></tr></thead>
      <tbody>${(state.discounts||[]).map(d=>`
        <tr>
          <td><strong>${d.label||'—'}</strong></td>
          <td>${d.start_time}</td>
          <td>${d.end_time}</td>
          <td><span class="badge badge-green">%${Number(d.discount_percent).toFixed(0)}</span></td>
          <td><div class="action-btns">
            <button class="btn btn-outline btn-sm" onclick="openDiscountModal(${d.id})">Düzenle</button>
            <button class="btn btn-danger btn-sm" onclick="deleteDiscount(${d.id})">Sil</button>
          </div></td>
        </tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--cream-dim);padding:2rem">Henüz indirim tanımı yok. Eklemek için + Yeni Ekle butonunu kullanın.</td></tr>'}
      </tbody>
    </table>`;
}

function openDiscountModal(id){
  const d=id?state.discounts.find(x=>x.id===id):null;
  openModal(d?'İndirim Düzenle':'Yeni İndirim',`
    <p style="font-size:12px;color:var(--cream-dim);margin:0 0 12px;line-height:1.5">Bu aralıkta uygulanacak sabit indirim. Müsaitlik indirimi ile karşılaştırılır; yüksek olan geçerlidir.</p>
    <div class="form-group"><label>Etiket (isteğe bağlı)</label><input class="form-control" id="dLabel" placeholder="Örn: Öğle indirimi" value="${d?.label||''}"></div>
    <div class="time-grid">
      <div class="form-group"><label>İndirim başlangıç saati</label><input class="form-control" type="time" id="dStart" value="${d?.start_time||'09:00'}"></div>
      <div class="form-group"><label>İndirim bitiş saati</label><input class="form-control" type="time" id="dEnd" value="${d?.end_time||'12:00'}"></div>
    </div>
    <div class="form-group"><label>İndirim oranı — bu adımda uygulanacak (%)</label><input class="form-control" type="number" min="0" max="100" step="1" id="dPercent" value="${d?.discount_percent??10}"></div>`,
  async()=>{
    const start_time=v('dStart')||'09:00';
    const end_time=v('dEnd')||'12:00';
    const discount_percent=+(v('dPercent')||0);
    if(!start_time||!end_time)return showToast('Başlangıç ve bitiş saati zorunlu.','error');
    if(discount_percent<0||discount_percent>100)return showToast('İndirim oranı 0–100 arası olmalı.','error');
    const body={label:v('dLabel')||'',start_time,end_time,discount_percent};
    if(id){await api('PUT',`/time-slot-discounts/${id}`,body);}
    else{await api('POST','/time-slot-discounts',body);}
    await loadAll();renderSection();closeModal();
    showToast(id?'Güncellendi.':'Eklendi.','success');
  });
}

async function deleteDiscount(id){
  if(!confirm('Bu indirimi silmek istediğinize emin misiniz?'))return;
  try{await api('DELETE',`/time-slot-discounts/${id}`);await loadAll();renderSection();showToast('Silindi.','success');}
  catch(e){showToast(e.message,'error');}
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
let modalSaveFn=null;
function openModal(title,body,onSave){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=`
    <button class="btn btn-ghost" onclick="closeModal()">Vazgeç</button>
    <button class="btn btn-gold" onclick="handleModalSave()">Kaydet</button>`;
  modalSaveFn=onSave;
  document.getElementById('modalOverlay').classList.add('open');
}
async function handleModalSave(){
  try{if(modalSaveFn)await modalSaveFn();}catch(e){showToast(e.message,'error');}
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── Utils ─────────────────────────────────────────────────────────────────────
function v(id){const el=document.getElementById(id);return el?el.value:'';}
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  const item=document.createElement('div');item.className=`toast-item ${type}`;item.textContent=msg;
  t.appendChild(item);setTimeout(()=>item.remove(),4000);
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadAll().then(()=>renderSection()).catch(e=>{
  document.getElementById('mainContent').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div>Veriler yüklenemedi.</div>';
  console.error(e);
});
</script>
</body>
</html>
